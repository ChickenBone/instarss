services:
  instarss:
    image: ghcr.io/chickenbone/instarss:latest
    # For local development, replace the image line above with:
    #   build: .
    container_name: instarss
    restart: unless-stopped
    volumes:
      - ./config:/app/config
      - ./data:/app/data
    environment:
      - TZ=UTC
      # - LOG_LEVEL=DEBUG
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
